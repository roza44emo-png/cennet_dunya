name: Otomatik Unzip ve Temizlik
on:
  push:
    paths:
      - 'cennet_dunya.zip'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Zipi Ac
        run: unzip -o cennet_dunya.zip -d .
      - name: Git Kaydet ve Gonder
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m 'Auto: Zip icerigi cikartildi [skip ci]' && git push)
